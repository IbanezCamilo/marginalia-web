server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML entry, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: React Router (createBrowserRouter) owns client-side routing,
    # so every unknown path must serve index.html instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
